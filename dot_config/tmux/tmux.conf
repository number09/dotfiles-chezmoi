# operate windows settings
set -s escape-time 0
set -g renumber-windows on
bind -n M-n new-window -c "#{pane_current_path}"
bind -n M-l next-window
bind -n M-h previous-window
bind -n M-r command-prompt "rename-window -- '%%'"

bind -n M-N command-prompt "new-session -n '%1'"
bind -n M-j switch-client -n
bind -n M-k switch-client -p

# split window settings
bind -n M-/ split-window -h -c "#{pane_current_path}" # Conflict vim to setting Ctrl
bind -n M-- split-window -v -c "#{pane_current_path}"

# pane move settings
bind -n M-Up    select-pane -U
bind -n M-Down  select-pane -D
bind -n M-Left  select-pane -L
bind -n M-Right select-pane -R

# status bar (tab-like windows at top)
set -g status-position top
set -g status-style "bg=colour236,fg=white"
set -g status-left "#[fg=green,bold] #S "
set -g status-left-length 30
set -g status-right "#[fg=colour245] %Y-%m-%d %H:%M "
set -g window-status-format " #I:#W "
set -g window-status-style "fg=colour245,bg=colour236"
set -g window-status-current-format " #I:#W "
set -g window-status-current-style "fg=black,bg=colour39,bold"
set -g window-status-separator ""
