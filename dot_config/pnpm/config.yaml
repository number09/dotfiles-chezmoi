# pnpm グローバル設定 (pnpm v11 以降。配置先: ~/.config/pnpm/config.yaml)
# pnpm-workspace.yaml と同じキーが使え、全プロジェクトに一括適用される。

# 公開後この分数が経過するまでパッケージをインストールしない。
# npm サプライチェーン攻撃（公開直後の汚染版を掴むリスク）への防御。
# 1440 分 = 1 日。推移的依存も対象。
#
# 注: 1440 は pnpm v11 のデフォルト値と同一。値自体は変わらないが、
# ポリシーを設定ファイルに明示し、将来 pnpm 側のデフォルトが
# 変わっても挙動を固定するためにあえて記述している。
minimumReleaseAge: 1440
