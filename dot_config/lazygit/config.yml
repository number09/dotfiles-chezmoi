git:
  autoFetch: false
  paging:
    pager: delta --dark --paging=never
customCommands:
  - key: "<c-t>"
    context: "worktrees"
    command: >-
      if [ -n "$CMUX_WORKSPACE_ID" ]; then
        surf_id=$(cmux new-surface --type terminal | awk '{print $2}');
        branch=$(git -C {{.SelectedWorktree.Path}} branch --show-current);
        cmux rename-tab --surface "$surf_id" "$branch";
        sleep 0.5;
        cmux send --surface "$surf_id" "cd {{.SelectedWorktree.Path}} && exec $SHELL
      ";
      else
        wezterm cli spawn --cwd {{.SelectedWorktree.Path}} -- bash -c 'branch=$(git -C {{.SelectedWorktree.Path}} branch --show-current); wezterm cli set-tab-title "$branch"; exec $SHELL';
      fi
    description: "Open worktree in new tab/workspace with branch name"
  - key: "<c-t>"
    context: "localBranches"
    command: >-
      if [ "{{.SelectedLocalBranch.Name}}" = "{{.CheckedOutBranch.Name}}" ]; then
        echo "現在チェックアウト中のブランチです。worktreeビューから操作してください。";
        exit 0;
      fi;
      if [ -n "$CMUX_WORKSPACE_ID" ]; then
        wt_path=$(gwq get {{.SelectedLocalBranch.Name}} 2>/dev/null);
        surf_id=$(cmux new-surface --type terminal | awk '{print $2}');
        cmux rename-tab --surface "$surf_id" "{{.SelectedLocalBranch.Name}}";
        sleep 0.5;
        cmux send --surface "$surf_id" "cd $wt_path && exec $SHELL
      ";
      else
        wezterm cli spawn --cwd $(gwq get {{.SelectedLocalBranch.Name}} 2>/dev/null) -- bash -c 'wezterm cli set-tab-title "{{.SelectedLocalBranch.Name}}"; exec $SHELL';
      fi
    description: "Open branch's worktree in new tab/workspace"
  # gwq add: 現在のブランチから新しいブランチとworktreeを作成
  - key: "<c-n>"
    command: "gwq add -b {{.Form.BranchName}}"
    context: "global"
    prompts:
      - type: "input"
        title: "新しいブランチとworktreeを作成 - ブランチ名を入力 (基点: {{.CheckedOutBranch.Name}})"
        key: "BranchName"
        initialValue: ""
    description: "gwq: 新しいブランチとworktreeを作成"
    output: terminal
  # gwq remove: 選択中のworktreeとブランチを削除（worktreeビューから）
  - key: "<c-x>"
    command: "{{if eq .Form.Confirm \"はい\"}}gwq remove -b {{.SelectedWorktree.Name}}{{end}}"
    context: "worktrees"
    prompts:
      - type: "menu"
        title: "worktree '{{.SelectedWorktree.Name}}' とブランチを削除しますか？"
        key: "Confirm"
        options:
          - name: "いいえ"
            value: "いいえ"
          - name: "はい"
            value: "はい"
    description: "gwq: 選択中のworktreeとブランチを削除"
    output: terminal
  # gwq remove: 選択中のブランチのworktreeとブランチを削除（localBranchesビューから）
  - key: "<c-x>"
    command: "{{if eq .Form.Confirm \"はい\"}}gwq remove -b {{.SelectedLocalBranch.Name}}{{end}}"
    context: "localBranches"
    prompts:
      - type: "menu"
        title: "ブランチ '{{.SelectedLocalBranch.Name}}' のworktreeとブランチを削除しますか？"
        key: "Confirm"
        options:
          - name: "いいえ"
            value: "いいえ"
          - name: "はい"
            value: "はい"
    description: "gwq: 選択中のブランチのworktreeとブランチを削除"
    output: terminal
  # gwq add: 選択したローカルブランチからworktreeを作成
  - key: "<c-a>"
    command: "gwq add {{.SelectedLocalBranch.Name}}"
    context: "localBranches"
    description: "gwq: 選択したローカルブランチからworktreeを作成"
    output: terminal
